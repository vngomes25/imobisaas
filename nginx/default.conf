# ── HTTP: redireciona para HTTPS (ou serve direto se ainda sem SSL) ───────────
server {
    listen 80;
    server_name _;

    # Certbot challenge (para emitir/renovar certificado SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Enquanto não tiver SSL, serve o app diretamente em HTTP
    # Após configurar SSL, remova o bloco "location /" daqui
    # e descomente o bloco de redirecionamento abaixo.
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    # Descomentar após ter o certificado SSL:
    # return 301 https://$host$request_uri;
}


