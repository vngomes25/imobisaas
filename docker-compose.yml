services:

  # ── MySQL Database ──────────────────────────────────────────────────────────
  db:
    image: mysql:8
    container_name: imobisaas-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: imobisaas
      MYSQL_USER: imobisaas
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Node.js Application ─────────────────────────────────────────────────────
  app:
    build: .
    container_name: imobisaas-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://imobisaas:${DB_PASSWORD}@db:3306/imobisaas
      JWT_SECRET: ${JWT_SECRET}
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "3000"

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: imobisaas-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro

volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local
  certbot_www:
    driver: local
  certbot_certs:
    driver: local
