# NGINX — ImobiSaaS
# Copiar para: /etc/nginx/sites-available/imobisaas
# Depois: sudo ln -s /etc/nginx/sites-available/imobisaas /etc/nginx/sites-enabled/
# Substituir "SEU_DOMINIO.com.br" pelo domínio real antes de usar

server {
    listen 80;
    server_name SEU_DOMINIO.com.br www.SEU_DOMINIO.com.br;

    # Redirecionar HTTP → HTTPS (após configurar o Certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name SEU_DOMINIO.com.br www.SEU_DOMINIO.com.br;

    # SSL — preenchido automaticamente pelo Certbot
    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Tamanho máximo de upload (fotos de imóveis)
    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/imobisaas.access.log;
    error_log  /var/log/nginx/imobisaas.error.log;

    # Proxy para o Node.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}
